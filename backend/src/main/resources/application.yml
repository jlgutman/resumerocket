spring:
  application:
    name: resumerocket-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/resumerocket}
    username: ${SPRING_DATASOURCE_USERNAME:resumerocket}
    password: ${SPRING_DATASOURCE_PASSWORD:resumerocket}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-only-secret-change-this-dev-only-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  export:
    storage-dir: ${EXPORT_STORAGE_DIR:./data/exports}

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    chat:
      options:
        model: ${OPENAI_MODEL:gpt-4o-mini}
        temperature: 0.3

logging:
  level:
    com.resumerocket: INFO

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.resumerocket: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/resumerocket_test}

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    com.resumerocket: WARN
